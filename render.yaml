services:
  - type: web
    name: ai-workspace-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-70b-instruct
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
